#Important parameter relevant to runtime：
#   self.min_t = 3.0 #check the code in fiss_plus_planner/planners/frenet_optimal_planner.py      
#   self.max_t = 5.0  
OUTPUT_DIR: "data/output/"
MEASUREMENTS_DIR: "data/measurements/"
INPUT_DIR: "data/demo" # the directory where the scenario files are located, it should contain the xml files of the scenarios to be tested, you can specify the scenario files to be tested by editing the FILES parameter below, if FILES is empty, it will run all the scenario files under this directory
# INPUT_DIR: "data/demo"
FILES: [] # empty by default if you want to run all the scenario files under the input directory

PLANNER: "FOP" # the name of the planner to be used, can be: FOP,FOP_CPP
N_W_SAMPLE: 5 #34 # number of lateral offset samples
N_S_SAMPLE: 5 #28 # number of longitudinal speed samples
N_T_SAMPLE: 5 #20 # number of time horizon samples
SAVE_GIF: True # save the animation as a .gif file
SAVE_MEASUREMENTS: True # save the measurement data as .csv file
Num_Threads_For_CollisionChecker: 16 # number of threads to be used in the numba parallel collision checker
Runtime_Measurement: False # keep it False if you need Save GIF
Collect_Data_For_ML: False # Collect data for ML training, check code in fiss_plus_planner/planners/frenet_optimal_planner.py
SHOW_SAMPLED_TRAJECTORIES: False # visualize the sampled trajectories in the animation, set it to False, it show only the selected best trajectory of each time step